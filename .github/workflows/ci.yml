# =============================================================================
# quarkus-nacos-starter — CI Pipeline
# =============================================================================
# Triggers:
#   - push / PR to master or main
#   - manual workflow_dispatch
#
# Stages:
#   1. Validate — compile + checkstyle (if spotless configured)
#   2. Test    — run unit tests
#   3. Package — build JAR
#   4. Publish — (on tag) deploy to GitHub Packages
# =============================================================================

name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Build & Test
  # --------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [25]
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Validate (compile + checkstyle)
        run: mvn validate compile --no-transfer-progress -Dmaven.wagon.http.retryHandler.count=3

      - name: Test
        run: mvn test --no-transfer-progress -Dmaven.wagon.http.retryHandler.count=3

      - name: Package
        run: mvn package -DskipTests --no-transfer-progress -Dmaven.wagon.http.retryHandler.count=3

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-nacos-starter-jdk${{ matrix.java }}
          path: target/*.jar
          retention-days: 7

  # --------------------------------------------------------------------------
  # Static Analysis (spotbugs + spotless)
  # --------------------------------------------------------------------------
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Spotless Check (formatting)
        run: mvn spotless:check --no-transfer-progress
        continue-on-error: true

      - name: SpotBugs (static analysis)
        run: mvn spotbugs:check --no-transfer-progress
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Publish to GitHub Packages (on tag push only)
  # --------------------------------------------------------------------------
  publish:
    name: Publish to GitHub Packages
    needs: [build, quality]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests --no-transfer-progress -Dmaven.wagon.http.retryHandler.count=3
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Create GitHub Release (on tag push)
  # --------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "# quarkus-nacos-starter ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate $(git tag --sort=-creatordate | head -2 | tail -1)..HEAD 2>/dev/null \
            || git log --oneline --no-decorate -20 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: quarkus-nacos-starter ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          generate_release_notes: false
          files: target/*.jar
