# Quarkus Nacos Starter — Native-Image Configuration
#
# Architecture (closed-loop fix for the 3-layer deadlock):
#   1. Code-level: Netty InternalLoggerFactory.newDefaultFactory() has
#      hardcoded branch order (Log4J2 → Log4J → SLF4J → JDK).
#      GraalVM static analysis scans ALL branches, so `new Log4J2LoggerFactory()`
#      triggers Unresolved type for non-existent shaded log4j2 classes.
#   2. The three JBoss bridging dependencies (slf4j-jboss-logmanager,
#      log4j-jboss-logmanager, log4j2-jboss-logmanager) ensure all three
#      top-level factory classes exist on classpath, satisfying GraalVM's
#      bytecode verification without needing the internal Log4J2Logger.
#   3. SLF4J branch wins at runtime — logging still goes through JBoss LogManager.
#
# Removed: blanket --initialize-at-run-time=com.alibaba.nacos (too coarse,
#           masked real init-order issues) and dozens of Netty channel-class
#           runtime init entries (no longer needed after the bridge fix).

# Nacos SSL NPN legacy compatibility
Args = --initialize-at-run-time=com.alibaba.nacos.shaded.io.grpc.netty.shaded.io.netty.handler.ssl.JdkNpnApplicationProtocolNegotiator
Args = --initialize-at-run-time=com.alibaba.nacos.shaded.io.grpc.netty.shaded.io.netty.internal.tcnative.SSL

# Prometheus Striped64 (shaded by nacos-client metrics)
Args = --initialize-at-run-time=io.prometheus.client.Striped64

# JBoss LogManager — constants must be available at build time
Args = --initialize-at-build-time=org.jboss.logmanager.Level
Args = --initialize-at-build-time=org.jboss.logmanager.Logger
Args = --initialize-at-build-time=org.jboss.logmanager.LoggerNode
Args = --initialize-at-build-time=org.jboss.logmanager.Logger$AttachmentKey

# Nacos NotifyCenter — defer static <clinit> to runtime, blocking build-time
# creation of the sharePublisher singleton (DefaultSharePublisher instance).
# Only NotifyCenter is needed; DefaultSharePublisher is reachable through it.
Args = --initialize-at-run-time=com.alibaba.nacos.common.notify.NotifyCenter

