# Quarkus Nacos Starter — Native-Image Configuration
#
# Nacos client SDK (nacos-client) has java.util.Random in static fields
# of ServerListManager and its inner classes, which is not allowed in
# native-image heap. Defer initialization of these classes to runtime.
Args = --initialize-at-run-time=com.alibaba.nacos.client.config.impl.ServerListManager$ServerAddressIterator$RandomizedServerAddress \
       --initialize-at-run-time=com.alibaba.nacos.client.config.impl.ServerListManager \
       --initialize-at-run-time=com.alibaba.nacos.client.naming.core.ServerListManager
