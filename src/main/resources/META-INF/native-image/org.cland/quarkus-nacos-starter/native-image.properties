# Quarkus Nacos Starter — Native-Image Configuration
#
# Nacos client SDK (nacos-client) eagerly initializes static state
# (Random instances, threads in NotifyCenter, etc.) that conflicts with
# native-image heap constraints. Defer ALL nacos classes to runtime.
# Since this starter disables Nacos at build time (NACOS_ENABLED=false),
# no nacos functionality is needed during image generation.
Args = --initialize-at-run-time=com.alibaba.nacos
