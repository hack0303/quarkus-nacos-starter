# ==============================================================================
# Nacos — Configuration Center (quarkus-config-nacos extension)
# All values can be overridden by environment variables at runtime.
# Nacos config overrides local application.properties (ordinal=280).
# ==============================================================================

quarkus.config.source.nacos.server-addr=${QUARKUS_CONFIG_SOURCE_NACOS_SERVER_ADDR:192.168.1.11:8848}
quarkus.config.source.nacos.namespace=${QUARKUS_CONFIG_SOURCE_NACOS_NAMESPACE:f00bead4-47a4-491a-a5e2-66d79f82d8a4}
quarkus.config.source.nacos.data-id=${QUARKUS_CONFIG_SOURCE_NACOS_DATA_ID:cland-chainpay-{service}}
quarkus.config.source.nacos.group=${QUARKUS_CONFIG_SOURCE_NACOS_GROUP:DEFAULT_GROUP}
quarkus.config.source.nacos.username=${QUARKUS_CONFIG_SOURCE_NACOS_USERNAME:chainpay}
quarkus.config.source.nacos.password=${QUARKUS_CONFIG_SOURCE_NACOS_PASSWORD:chainpay123}
quarkus.config.source.nacos.timeout-ms=${QUARKUS_CONFIG_SOURCE_NACOS_TIMEOUT_MS:5000}

# ==============================================================================
# Nacos — Service Registration / Discovery (native nacos-client SDK)
# These are consumed by NacosClientManager / NacosServiceRegistry /
# NacosServiceDiscovery / NacosHealthCheck.
# Uses independent property namespace (nacos.*) decoupled from
# quarkus-config-nacos extension.
# ==============================================================================

nacos.server-addr=${NACOS_SERVER_ADDR:192.168.1.11:8848}
nacos.namespace=${NACOS_NAMESPACE:f00bead4-47a4-491a-a5e2-66d79f82d8a4}
nacos.username=${NACOS_USERNAME:chainpay}
nacos.password=${NACOS_PASSWORD:chainpay123}
nacos.discovery.service-name=${NACOS_DISCOVERY_SERVICE_NAME:cland-chainpay-{service}}
nacos.discovery.service-group=${NACOS_DISCOVERY_SERVICE_GROUP:DEFAULT_GROUP}
nacos.discovery.cluster=${NACOS_DISCOVERY_CLUSTER:DEFAULT}
nacos.discovery.ip=${NACOS_DISCOVERY_IP:auto}
nacos.discovery.port=${NACOS_DISCOVERY_PORT:8080}

# Backward-compatible alias (used by some services)
nacos.service.name=${nacos.discovery.service-name}
nacos.service.group=${nacos.discovery.service-group}
nacos.service.cluster=${nacos.discovery.cluster}
nacos.addr=${nacos.server-addr}
